name: Update Forms Results

on:
  workflow_dispatch: # Allows manual triggering from GitHub UI
  # schedule:
  #   - cron: '0 */6 * * *' # Runs every 6 hours. Adjust as needed.

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # Use the latest Python 3.x

    - name: Install dependencies
      run: pip install -r ihub_site/requirements.txt

    - name: Run script to update results.html
      run: python ihub_site/update_forms_results.py
      env:
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add ihub_site/results.html
        git commit -m "Automated: Update Microsoft Forms results" || echo "No changes to commit"
        git push
